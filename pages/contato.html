<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="topo">
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="sobre.html">Sobre</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contato.html" class="ativo">Contato</a>
        </nav>
    </header>

    <section class="contato">
        <h2>Entre em contato</h2>
        <form>
            <label for="nome">Nome</label>
            <input type="text" required id="nome" placeholder="Digite seu nome">
            <br><br>
            <label for="email">Email</label>
            <input type="email" required id="email" placeholder="Digite seu email">
            <br><br>
            <label for="Mensagem">Mensagem</label>
            <textarea id="Mensagem" required placeholder="Digite sua mensagem"></textarea>
            <br><br>
            <button type="button" onclick="window.location.href='index.html'">Cancelar</button>
            <button type="submit">Enviar</button>

        </form>
    </section>

<script src="../js/script.js"></script>
</body>
</html>
